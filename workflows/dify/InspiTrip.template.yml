        prompt_template:
        - edition_type: basic
          id: 00d3de48-e681-4552-87ad-ac68ca1e80f1
          role: system
          text: '你是 InspiTrip 的 Query Planner。产品只服务江浙沪周末目的地发现。你必须只输出一个符合 Query Plan JSON Schema 的 JSON 对象，不要输出 Markdown、解释或额外字段。


            一、先判断 scope 与 task_type


            1. 明确要去江浙沪之外旅行：scope=out_of_region，task_type=unsupported。

            2. 非旅行、闲聊、问系统本身或无意义输入：scope=not_travel，task_type=chitchat。

            3. 纯订酒店、找餐厅或找咖啡馆，且没有目的地发现/观光需求：scope=not_supported_yet，task_type=unsupported。

            4. 询问一个已知江浙沪目的地内部怎么玩：scope=in_domain，task_type=experience_lookup，并把用户明确说出的目的地原名写入 target_destination。

            5. 从感觉和约束出发寻找“周末去哪”：scope=in_domain，task_type=destination_discovery，target_destination=null。


            scope 非 in_domain 时：target_destination=null；hard_constraints 全部为 null/空数组；exclusions、三类 soft_preferences、semantic_query、evidence_aspects
            全部清空。不得让 out_of_region、not_travel、not_supported_yet 进入检索。


            二、硬约束


            1. 只抽用户本轮明确表达的 origin、days_max、budget_max、travel_time_max、transport_modes、must_have_activities；缺失填 null 或 []，禁止脑补。

            2. 中文数字要归一：周末/两天一夜=2 天；三天两夜=3 天；三小时内=180 分钟；两到三小时=180 分钟；预算一千五=1500 元。

            3. 范围字段使用用户给出的上界，例如“1000 到 1500 元”写 budget_max=1500，“两到三天”写 days_max=3。

            4. transport_modes 只允许：高铁、自驾、大巴、轮渡、地铁、公共交通。

            5. 明确目的活动（“必须看海”“想逛古镇”“只想泡温泉”）进入 must_have_activities，且只能使用 act_* taxonomy leaf_id。

            6. 弱活动（“顺便喝咖啡”“可以骑行”“有的话泡温泉”）只进入 soft_preferences.activity。

            7. 必须逐分句、逐短语判断强弱，不能用一句话里的“顺便/可以”影响其他活动。

            8. 否定活动（“不要爬山”“不想徒步”）绝不能进入 must_have_activities 或 soft activity；应把相应 act_* 放入 exclusions。

            9. 双重否定保持保守，例如“不是不能徒步”不视为排除，也不升级为硬活动，可作为低置信软活动。


            三、exclusions 与“不商业化”


            1. exclusions 是规范字符串数组。活动否定使用 act_*；其他常用值使用“网红”“拥挤”“商业化”以及被否定的交通方式。

            2. “不商业化/原生态/没开发”同时表达 vibe_unspoiled 和 exclusion“商业化”。

            3. “不要网红/没那么网红/小众”产生 exclusion“网红”；“避开人潮/人少/不拥挤”产生 exclusion“拥挤”。

            4. 否定词的作用域只覆盖紧邻的短语，不要把后续正向活动一起否定。


            四、感觉标签


            只能使用以下 taxonomy leaf_id，每个维度最多 2 项，confidence 低于 0.55 不输出。未表达的维度必须为 []。


            mood：mood_unwind 独处放空；mood_heal 松弛治愈；mood_romantic 浪漫；mood_excited 冒险；mood_nostalgic 怀旧；mood_social 欢聚；mood_inspired
            文艺充电；mood_freedom 自在随性。


            vibe：vibe_niche 小众冷门；vibe_unspoiled 不商业化；vibe_artsy 文艺；vibe_nature 自然；vibe_local 市井烟火；vibe_cozy 精致惬意；vibe_ancient
            古朴；vibe_urban 都市。


            activity：act_sea 看海赶海；act_hike 徒步山野；act_camp 露营星空；act_town 古镇老街；act_cafe 咖啡书店；act_art 看展逛馆；act_ride 骑行；act_stay
            住宿；act_hotspring 温泉；act_food 寻味。


            五、semantic_query 与 evidence_aspects


            1. semantic_query 只对用户明确表达的正向内容做忠实归一；不得新增地点、活动、预算、天数、交通方式或主题。

            2. 用户信息少就保持短。否定条件放 exclusions，不靠 semantic_query 承载。

            3. evidence_aspects 只按明确需求选择：安静/人少/网红→crowd；不商业化→commercialization；预算→cost；出发地/时间/方式→transport；看海/山景→scenery；活动→activity；独处→solo/mood_fit；季节/天气→weather_season。

            4. 本阶段不生成天气安全风险、门票或完整轮渡班次结论。


            六、规则纠错示例


            “不想徒步，只想看海”→ must_have_activities=["act_sea"]，exclusions 含 "act_hike"。

            “必须看海，顺便喝咖啡”→ must_have_activities=["act_sea"]，soft_preferences.activity 仅含 act_cafe。

            “想找不商业化、没那么网红的地方”→ vibe 含 vibe_unspoiled，exclusions 含“商业化”“网红”。

            “普陀山怎么玩”→ experience_lookup，target_destination="普陀山"。


            用户当前输入：{{#sys.query#}}'
        retry_config:
          max_retries: 2
          retry_enabled: true
          retry_interval: 1000
        selected: false
        structured_output:
          schema:
            $schema: http://json-schema.org/draft-07/schema#
            title: InspiTrip Query Plan Schema
            type: object
            additionalProperties: false
            required:
            - scope
            - task_type
            - target_destination
            - hard_constraints
            - exclusions
            - semantic_query
            - soft_preferences
            - evidence_aspects
            properties:
              scope:
                type: string
                enum:
                - in_domain
                - out_of_region
                - not_travel
                - not_supported_yet
              task_type:
                type: string
                enum:
                - destination_discovery
                - experience_lookup
                - chitchat
                - unsupported
              target_destination:
                type:
                - string
                - 'null'
                description: experience_lookup 的已知目的地名称；未明确目的地时必须为 null。
              hard_constraints:
                type: object
                additionalProperties: false
                required:
                - origin
                - days_max
                - budget_max
                - travel_time_max
                - transport_modes
                - must_have_activities
                properties:
                  origin:
                    type:
                    - string
                    - 'null'
                  days_max:
                    type:
                    - integer
                    - 'null'
                    minimum: 1
                  budget_max:
                    type:
                    - integer
                    - 'null'
                    minimum: 0
                  travel_time_max:
                    type:
                    - integer
                    - 'null'
                    minimum: 0
                  transport_modes:
                    type: array
                    items:
                      type: string
                      enum:
                      - 高铁
                      - 自驾
                      - 大巴
                      - 轮渡
                      - 地铁
                      - 公共交通
                  must_have_activities:
                    type: array
                    uniqueItems: true
                    items:
                      $ref: '#/definitions/activityId'
              exclusions:
                type: array
                uniqueItems: true
                items:
                  type: string
                  minLength: 1
              semantic_query:
                type: string
              soft_preferences:
                type: object
                additionalProperties: false
                required:
                - mood
                - vibe
                - activity
                properties:
                  mood:
                    $ref: '#/definitions/weightedMoodTags'
                  vibe:
                    $ref: '#/definitions/weightedVibeTags'
                  activity:
                    $ref: '#/definitions/weightedActivityTags'
              evidence_aspects:
                type: array
                uniqueItems: true
                items:
                  type: string
                  enum:
                  - mood_fit
                  - crowd
                  - commercialization
                  - scenery
                  - activity
                  - transport
                  - cost
                  - stay
                  - food
                  - solo
                  - photo
                  - safety
                  - weather_season
                  - other
            definitions:
              activityId:
                type: string
                enum:
                - act_sea
                - act_hike
                - act_camp
                - act_town
                - act_cafe
                - act_art
                - act_ride
                - act_stay
                - act_hotspring
                - act_food
              weightedTagBase:
                type: object
                additionalProperties: false
                required:
                - id
                - confidence
                properties:
                  id:
                    type: string
                  confidence:
                    type: number
                    minimum: 0
                    maximum: 1
              weightedMoodTags:
                type: array
                maxItems: 2
                uniqueItems: true
                items:
                  allOf:
                  - $ref: '#/definitions/weightedTagBase'
                  - properties:
                      id:
                        enum:
                        - mood_unwind
                        - mood_heal
                        - mood_romantic
                        - mood_excited
