    - data:
        code: "import json\n\n\ndef _text(value):\n    return \" \".join(str(value or \"\").split())\n\n\ndef main(body=\"\
          \") -> dict:\n    try:\n        data = json.loads(body or \"{}\")\n    except Exception:\n        data = {}\n  \
          \  validation = data.get(\"validation\") or {}\n    reasons = {\n        str(row.get(\"destination_id\") or \"\"\
          ): row\n        for row in validation.get(\"recommendations\") or []\n    }\n    lines = []\n    for index, card\
          \ in enumerate(data.get(\"fact_cards\") or [], 1):\n        destination_id = str(card.get(\"destination_id\") or\
          \ \"\")\n        reason = reasons.get(destination_id) or {}\n        block = [f\"{index}. {_text(card.get('name'))}（{_text(card.get('city'))}）\"\
          ]\n        if reason.get(\"reason\"):\n            block.append(\"- 感觉理由：\" + _text(reason.get(\"reason\")))\n \
          \       duration = card.get(\"duration\") or {}\n        if duration.get(\"min_days\") is not None or duration.get(\"\
          max_days\") is not None:\n            block.append(\n                f\"- 建议天数：{duration.get('min_days') if duration.get('min_days')\
          \ is not None else '?'}–\"\n                f\"{duration.get('max_days') if duration.get('max_days') is not None\
          \ else '?'} 天\"\n                f\"（来源：{_text(duration.get('source')) or '待核实'}）\"\n            )\n        budget\
          \ = card.get(\"budget\") or {}\n        if budget.get(\"typical\") is not None:\n            block.append(f\"- 预算代表值：人均约\
          \ {budget.get('typical')} 元（置信度：{_text(budget.get('confidence')) or '未知'}）\")\n        assumptions = card.get(\"\
          assumptions\") or []\n        if assumptions:\n            block.append(\"- 透明降级：\" + \"、\".join(_text(value) for\
          \ value in assumptions))\n        for travel in (card.get(\"travel_options\") or [])[:3]:\n            minutes =\
          \ travel.get(\"travel_minutes\")\n            value = f\"约 {minutes} 分钟\" if minutes is not None else \"耗时未知\"\n\
          \            note = (\"；\" + _text(travel.get(\"note\"))) if travel.get(\"note\") else \"\"\n            block.append(\n\
          \                f\"- 交通事实：{_text(travel.get('origin_city'))} → {_text(travel.get('transport_mode'))}，\"\n     \
          \           f\"{value}，置信度{_text(travel.get('confidence')) or '低'}{note}\"\n            )\n        for caveat in\
          \ (card.get(\"caveats\") or [])[:1]:\n            block.append(\"- UGC 限制：\" + _text(caveat.get(\"claim\") or caveat.get(\"\
          key_quote\")))\n        weather = card.get(\"weather\") or {}\n        if weather.get(\"available\"):\n        \
          \    current = weather.get(\"current\") or {}\n            block.append(\n                f\"- 实时天气（高德）：{_text(current.get('weather'))\
          \ or '未知'}，\"\n                f\"{_text(current.get('temperature_c')) or '未知'}℃，\"\n                f\"湿度{_text(current.get('humidity_percent'))\
          \ or '未知'}%\"\n                f\"（发布时间 {_text(weather.get('reporttime')) or '未知'}）\"\n            )\n        external\
          \ = card.get(\"external_verification\") or {}\n        label = _text(external.get(\"label\")) or \"低置信近期核验\"\n \
          \       season = (external.get(\"best_season_sources\") or [])[:1]\n        recent = (external.get(\"recent_crowd_and_trend_sources\"\
          ) or [])[:1]\n        if season:\n            block.append(f\"- {label}（季节）：{_text(season[0].get('snippet'))}｜{_text(season[0].get('url'))}\"\
          )\n        if recent:\n            block.append(f\"- {label}（拥挤/网红化）：{_text(recent[0].get('snippet'))}｜{_text(recent[0].get('url'))}\"\
          )\n        lines.append(\"\\n\".join(block))\n    return {\n        \"final_answer\": \"\\n\\n\".join(lines) if\
          \ lines else \"当前没有可安全输出的推荐结果。\",\n        \"passed\": \"true\" if validation.get(\"passed\") else \"false\",\n\
          \        \"fallback_used\": \"true\" if validation.get(\"fallback_used\") else \"false\",\n    }\n"
        code_language: python3
