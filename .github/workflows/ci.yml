name: CI

on:
  push:
    branches: [main, portfolio-restructure]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Recommendation tests
        run: python -m unittest discover -s tests/recommendation -q
      - name: Pipeline tests
        run: python -m unittest discover -s tests/pipelines -q
      - name: Database tests
        run: python -m unittest discover -s tests/database -q
      - name: API tests
        run: python -m unittest discover -s tests/api -q
      - name: Public repository tests
        run: python -m unittest discover -s tests/quality -q
      - name: Security and provenance audit
        run: python scripts/verify_public_repository.py
      - name: Validate site JavaScript
        run: node --check site/app.js
